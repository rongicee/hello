name: 每日自动获取天气（稳定国内接口）

# 每天北京时间 08:00 自动运行
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:     # 允许手动测试运行

jobs:
  weather:
    runs-on: ubuntu-latest
    steps:
      - name: 获取北京天气
        run: |
          echo "===================================="
          echo "🌤  今日天气查询"
          echo "===================================="
          
          # 调用稳定免费天气接口（北京）
          curl -s "https://api.vvhan.com/api/weather?city=北京" | jq .
          
          echo "===================================="
          echo "✅ 天气获取成功！"
          echo "⏰ 运行时间: $(date '+%Y-%m-%d %H:%M:%S')"
